<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太田啓路 AR名刺</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; background: #000; }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      pointer-events: none;
    }

    #header {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0,200,150,0.3);
    }

    #header .logo {
      font-size: 13px;
      color: #00c896;
      letter-spacing: 2px;
      font-weight: 600;
    }

    #header .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
    }

    #scan-hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      pointer-events: none;
      text-align: center;
    }

    .hint-box {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,200,150,0.4);
      border-radius: 12px;
      padding: 14px 24px;
      color: white;
      font-size: 13px;
      line-height: 1.6;
    }

    .hint-box .jp { font-size: 14px; color: #00c896; margin-bottom: 2px; }
    .hint-box .en { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 1px; }

    /* scanning animation corners */
    .corner {
      position: fixed;
      width: 24px; height: 24px;
      border-color: #00c896;
      border-style: solid;
      z-index: 998;
      opacity: 0.8;
    }
    .corner.tl { top: 72px; left: 20px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 72px; right: 20px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: 120px; left: 20px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: 120px; right: 20px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

    .scan-line {
      position: fixed;
      left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #00c896, transparent);
      z-index: 997;
      top: 72px;
      animation: scanMove 3s ease-in-out infinite;
    }

    @keyframes scanMove {
      0%   { top: 72px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100vh - 120px); opacity: 0; }
    }

    /* marker link button */
    #marker-btn {
      position: fixed;
      top: 70px;
      right: 16px;
      z-index: 999;
      pointer-events: all;
      background: rgba(0,200,150,0.15);
      border: 1px solid rgba(0,200,150,0.5);
      border-radius: 8px;
      padding: 8px 12px;
      color: #00c896;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>

  <div id="ui-overlay">
    <div id="header">
      <div>
        <div class="logo">AR MEISHI · 太田啓路</div>
        <div class="subtitle">POINT CAMERA AT MARKER</div>
      </div>
    </div>
  </div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="scan-line"></div>

  <a id="marker-btn" href="marker.html" target="_blank">
    🔲 マーカーを表示
  </a>

  <div id="scan-hint">
    <div class="hint-box">
      <div class="jp">マーカーにカメラを向けてください</div>
      <div class="en">SCAN THE MARKER TO VIEW AR CARD</div>
    </div>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    vr-mode-ui="enabled: false"
    style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;"
  >

    <a-assets>
      <!-- Card background plane -->
    </a-assets>

    <a-marker type="pattern" url="marker.patt">

      <!-- Card base -->
      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="3.5" height="2"
        color="#0a1628"
        opacity="0.95"
      ></a-plane>

      <!-- Green accent top bar -->
      <a-plane
        position="0 0.9 0.01"
        rotation="-90 0 0"
        width="3.5" height="0.08"
        color="#00c896"
        opacity="1"
      ></a-plane>

      <!-- Green accent bottom bar -->
      <a-plane
        position="0 -0.9 0.01"
        rotation="-90 0 0"
        width="3.5" height="0.04"
        color="#00c896"
        opacity="0.5"
      ></a-plane>

      <!-- Name: 太田 啓路 -->
      <a-text
        value="太田 啓路"
        position="-0.3 0.55 0.05"
        rotation="-90 0 0"
        color="#ffffff"
        width="4"
        font="https://cdn.jsdelivr.net/gh/etiennepinchon/aframe-fonts@master/fonts/noto-sans-jp/NotoSansJP-Regular.json"
        align="left"
        anchor="left"
      ></a-text>

      <!-- Kana -->
      <a-text
        value="オオタ ケイジ"
        position="-0.3 0.3 0.05"
        rotation="-90 0 0"
        color="#00c896"
        width="2.2"
        align="left"
        anchor="left"
      ></a-text>

      <!-- PhD -->
      <a-text
        value="博士（国際情報通信学）"
        position="-0.3 0.1 0.05"
        rotation="-90 0 0"
        color="rgba(255,255,255,0.7)"
        width="2"
        align="left"
        anchor="left"
      ></a-text>

      <!-- ICU -->
      <a-text
        value="国際基督教大学(ICU)"
        position="-0.3 -0.1 0.05"
        rotation="-90 0 0"
        color="#ffffff"
        width="2.2"
        align="left"
        anchor="left"
      ></a-text>

      <a-text
        value="シニアレクチャラー"
        position="-0.3 -0.3 0.05"
        rotation="-90 0 0"
        color="rgba(255,255,255,0.8)"
        width="2.2"
        align="left"
        anchor="left"
      ></a-text>

      <!-- Company -->
      <a-text
        value="株式会社リ・インベンション CEO"
        position="-0.3 -0.55 0.05"
        rotation="-90 0 0"
        color="rgba(255,255,255,0.65)"
        width="2"
        align="left"
        anchor="left"
      ></a-text>

      <!-- Divider line -->
      <a-plane
        position="0.9 0 0.02"
        rotation="-90 0 0"
        width="0.01" height="1.6"
        color="#00c896"
        opacity="0.4"
      ></a-plane>

      <!-- Right side: speciality tags -->
      <a-text
        value="SPECIALTY"
        position="1.1 0.65 0.05"
        rotation="-90 0 0"
        color="#00c896"
        width="1.6"
        align="left"
        anchor="left"
      ></a-text>

      <a-text
        value="XR / VR / AR / MR"
        position="1.1 0.45 0.05"
        rotation="-90 0 0"
        color="#ffffff"
        width="1.8"
        align="left"
        anchor="left"
      ></a-text>

      <a-text
        value="3D映像・コンテンツ制作"
        position="1.1 0.2 0.05"
        rotation="-90 0 0"
        color="rgba(255,255,255,0.75)"
        width="1.6"
        align="left"
        anchor="left"
      ></a-text>

      <a-text
        value="システム開発"
        position="1.1 0.0 0.05"
        rotation="-90 0 0"
        color="rgba(255,255,255,0.75)"
        width="1.6"
        align="left"
        anchor="left"
      ></a-text>

      <a-text
        value="人間工学的評価"
        position="1.1 -0.2 0.05"
        rotation="-90 0 0"
        color="rgba(255,255,255,0.75)"
        width="1.6"
        align="left"
        anchor="left"
      ></a-text>

      <a-text
        value="re-invention.jp"
        position="1.1 -0.55 0.05"
        rotation="-90 0 0"
        color="#00c896"
        width="1.6"
        align="left"
        anchor="left"
      ></a-text>

      <!-- Floating glowing orb -->
      <a-sphere
        position="0 0 0.8"
        radius="0.12"
        color="#00c896"
        opacity="0.3"
        animation="property: position; to: 0 0 1.1; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine"
      ></a-sphere>

      <a-sphere
        position="0 0 0.8"
        radius="0.06"
        color="#00c896"
        opacity="0.9"
        animation="property: position; to: 0 0 1.1; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine"
      ></a-sphere>

      <!-- Floating XR label above card -->
      <a-text
        value="XR"
        position="0 0 1.5"
        rotation="-90 0 0"
        color="#00c896"
        width="3"
        align="center"
        opacity="0.15"
        animation="property: rotation; to: -90 360 0; dur: 8000; loop: true; easing: linear"
      ></a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
