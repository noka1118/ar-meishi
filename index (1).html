<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>太田啓路 AR名刺</title>
  <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.3.0/dist/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }
    #overlay { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; pointer-events: none; }
    #header { background: rgba(0,0,0,0.7); padding: 12px 16px; border-bottom: 1px solid #00c896; }
    #header p:first-child { color: #00c896; font-size: 13px; letter-spacing: 2px; font-family: monospace; font-weight: bold; }
    #header p:last-child { color: rgba(255,255,255,0.5); font-size: 10px; letter-spacing: 1px; font-family: monospace; }
    #hint { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; white-space: nowrap; background: rgba(0,0,0,0.7); border: 1px solid #00c896; border-radius: 10px; padding: 12px 20px; color: white; font-family: monospace; font-size: 13px; text-align: center; }
    #hint span { color: #00c896; display: block; margin-bottom: 2px; }
    #markerbtn { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: all; background: #00c896; color: #000; font-family: monospace; font-size: 13px; font-weight: bold; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; text-decoration: none; display: block; white-space: nowrap; }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="header">
      <p>AR MEISHI · 太田啓路</p>
      <p>POINT CAMERA AT HIRO MARKER</p>
    </div>
  </div>
  <a id="markerbtn" href="marker.html" target="_blank">🔲 マーカーを表示する</a>
  <div id="hint">
    <span>マーカーにカメラを向けてください</span>
    SCAN THE HIRO MARKER
  </div>
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;">
    <a-marker preset="hiro">
      <a-box position="0 0.05 0" width="3.5" height="0.1" depth="2" color="#0a1628"></a-box>
      <a-box position="0 0.11 -0.85" width="3.5" height="0.02" depth="0.06" color="#00c896"></a-box>
      <a-text value="Keiji Ota" position="-1.5 0.15 -0.5" rotation="-90 0 0" color="#ffffff" width="5" align="left"></a-text>
      <a-text value="ICU Senior Lecturer / XR Researcher" position="-1.5 0.15 -0.1" rotation="-90 0 0" color="#00c896" width="3.5" align="left"></a-text>
      <a-text value="Re-Invention Inc. CEO" position="-1.5 0.15 0.3" rotation="-90 0 0" color="rgba(255,255,255,0.7)" width="3" align="left"></a-text>
      <a-text value="re-invention.jp" position="-1.5 0.15 0.65" rotation="-90 0 0" color="#00c896" width="3" align="left"></a-text>
      <a-sphere position="0 0.8 0" radius="0.15" color="#00c896" opacity="0.7" animation="property: position; to: 0 1.3 0; dur: 1800; dir: alternate; loop: true; easing: easeInOutSine"></a-sphere>
      <a-text value="XR" position="0 1.5 0" rotation="-90 0 0" color="#00c896" width="4" align="center" animation="property: rotation; to: -90 360 0; dur: 6000; loop: true; easing: linear"></a-text>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
