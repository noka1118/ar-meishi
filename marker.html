<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR マーカー – 太田啓路</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f5f0;
      font-family: -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      gap: 32px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      max-width: 340px;
      width: 100%;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }

    .marker-wrap {
      width: 220px;
      height: 220px;
      margin: 0 auto 24px;
      border: 6px solid #000;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
    }

    .marker-wrap img {
      width: 100%;
      height: 100%;
      display: block;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .steps {
      text-align: left;
      background: #f9f9f7;
      border-radius: 10px;
      padding: 16px;
    }

    .step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .step:last-child { margin-bottom: 0; }

    .step-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #00c896;
      color: white;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text {
      font-size: 13px;
      color: #444;
      line-height: 1.5;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0a1628;
      color: #00c896;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 13px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="marker-wrap">
      <img src="hiro.png" alt="Hiro marker" style="width:100%;height:100%;display:block;">
    </div>

    <h1>太田啓路 ARマーカー</h1>
    <div class="sub">このマーカーをスキャンして<br>AR名刺を表示してください</div>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">このページをそのまま表示するか、マーカーを印刷してください</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">別の端末またはタブで AR名刺ページを開く</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">カメラをマーカーに向けると名刺が浮かび上がります ✨</div>
      </div>
    </div>
  </div>

  <a class="back-btn" href="index.html">← カメラを起動する</a>

</body>
</html>
